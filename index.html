<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>It Was Always You</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    /* نجوم العتبة */
    #starCanvas {
      position: fixed; top:0; left:0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    #thresholdScene {
      position: fixed; top:0; left:0;
      width: 100%; height: 100vh;
      z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
    }
    .symbol {
      position: absolute; top: 25%;
      font-size: 2rem; color: #D4B28C;
      opacity: 0; transform: translateY(20px);
      font-family: 'Cormorant Garamond', serif;
    }
    .text-group {
      position: absolute; width: 100%;
      text-align: center;
      color: #F2E9E4;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      line-height: 2.6;
      opacity: 0; transform: translateY(30px);
      white-space: pre-line;
      font-family: 'Cormorant Garamond', serif;
    }
    #beginBtn {
      position: absolute; bottom: 18%;
      font-size: 1.2rem;
      color: rgba(212,178,140,0.85);
      cursor: pointer;
      pointer-events: auto;
      transition: color 0.4s, text-shadow 0.4s;
      font-family: 'Cormorant Garamond', serif;
      opacity: 0; transform: translateY(20px);
      background: none; border: none; outline: none;
      letter-spacing: 0.15em;
    }
    #beginBtn:hover { color: #f0dec9; text-shadow: 0 0 12px rgba(212,178,140,0.6); }
    #transitionInfo {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 30; opacity: 0; pointer-events: none;
    }
    .date-stack {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem; font-weight: 300;
      color: #D4B28C;
      direction: ltr; line-height: 1.4;
      margin-bottom: 1rem;
    }
    .location-text {
      font-family: 'Inter', sans-serif;
      font-size: 1rem; font-weight: 300;
      color: #b8a082;
      letter-spacing: 0.05em; direction: ltr;
    }
    /* حاوية المشاهد */
    #sceneContainer {
      position: fixed; top:0; left:0;
      width: 100%; height: 100vh;
      z-index: 40;
      display: none;
      background: #0A0808;
    }
  </style>
</head>
<body>
  <canvas id="starCanvas"></canvas>
  <div id="thresholdScene">
    <div class="symbol" id="symbol">✦</div>
    <div class="text-group" id="text1">There was a time...<br>when we were just<br>two strangers.</div>
    <div class="text-group" id="text2">We didn't know it then...<br>but life<br>was already<br>bringing us together.</div>
    <button id="beginBtn">Come with me →</button>
  </div>
  <div id="transitionInfo">
    <div class="date-stack">6<br>October<br>2023</div>
    <div class="location-text">NASA Space Apps Cairo<br>AUC — New Cairo</div>
  </div>
  <div id="sceneContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/transition.js"></script>
  <script>
    (function() {
      const canvas = document.getElementById('starCanvas');
      const ctx = canvas.getContext('2d');
      let w, h;
      let bgStars = [], fgStars = [];
      const BG = 200, FG = 50;
      let maxBg = 0, maxFg = 0, speedMul = 0, canvasOpacity = 1;

      function resize() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
      window.addEventListener('resize', resize); resize();
      function createStars() {
        bgStars = []; fgStars = [];
        for(let i=0;i<BG;i++) bgStars.push({x:Math.random()*w, y:Math.random()*h, r:Math.random()*1.6+0.3, b:Math.random()*0.5+0.4, sp:Math.random()*0.015+0.005, off:Math.random()*Math.PI*2, d:0.2});
        for(let i=0;i<FG;i++) fgStars.push({x:Math.random()*w, y:Math.random()*h, r:Math.random()*2.8+0.8, b:Math.random()*0.7+0.3, sp:Math.random()*0.03+0.01, off:Math.random()*Math.PI*2, d:0.8});
      }
      createStars(); window.addEventListener('resize', createStars);
      function draw() {
        ctx.clearRect(0,0,w,h);
        if(canvasOpacity<=0) return;
        ctx.save();
        let drawnBg = Math.min(maxBg, bgStars.length);
        for(let i=0;i<drawnBg;i++){let s=bgStars[i]; let tw=Math.sin(Date.now()*s.sp+s.off)*0.2+0.8; let y=s.y-speedMul*s.d*200; let dy=((y%h)+h)%h; ctx.beginPath(); ctx.arc(s.x,dy,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,245,235,${s.b*tw})`; ctx.fill();}
        let drawnFg = Math.min(maxFg, fgStars.length);
        for(let i=0;i<drawnFg;i++){let s=fgStars[i]; let tw=Math.sin(Date.now()*s.sp+s.off)*0.25+0.75; let y=s.y-speedMul*s.d*250; let dy=((y%h)+h)%h; ctx.beginPath(); ctx.arc(s.x,dy,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,240,220,${s.b*tw})`; ctx.fill();}
        ctx.restore();
      }
      function animate() { draw(); requestAnimationFrame(animate); }
      animate();

      const tl = gsap.timeline({defaults:{ease:'power2.inOut'}});
      tl.to({v:0},{v:BG,duration:4,delay:0.8,onUpdate:function(){maxBg=Math.floor(this.targets()[0].v)}},'s');
      tl.to({v:0},{v:FG,duration:3.5,delay:1.5,onUpdate:function(){maxFg=Math.floor(this.targets()[0].v)}},'s');
      tl.to('#symbol',{opacity:1,y:0,duration:1.8,delay:3.2},'sym');
      tl.to('#text1',{opacity:1,y:0,duration:2.2,delay:2},'t1');
      tl.to('#text1',{opacity:0,delay:5.5,duration:1.6},'t1h');
      tl.to('#text2',{opacity:1,y:0,duration:2.2,delay:0.8},'t2');
      tl.to('#text2',{opacity:0,delay:4.5,duration:1.6},'t2h');
      tl.to('#beginBtn',{opacity:1,y:0,duration:1.3,delay:2.8},'btn');

      const beginBtn = document.getElementById('beginBtn');
      const transitionInfo = document.getElementById('transitionInfo');
      let passed = false;

      beginBtn.addEventListener('click', ()=>{
        if(passed) return;
        passed = true;
        gsap.to(['#beginBtn','#text2','#symbol'],{opacity:0,duration:0.5,ease:'power2.in'});

        // تشغيل موسيقى العتبة (ستستمر في Scene 01)
        AudioManager.playThreshold();

        setTimeout(()=>{
          gsap.to({v:0},{v:1,duration:3,ease:'power2.in',onUpdate:function(){speedMul=this.targets()[0].v*5;},onComplete:()=>{
            gsap.to(canvas,{opacity:0,duration:1.8,ease:'power2.inOut',onUpdate:()=>{canvasOpacity=canvas.style.opacity;},onComplete:()=>{
              setTimeout(() => {
                gsap.to(transitionInfo,{opacity:1,duration:2.2,ease:'power2.out',onComplete:()=>{
                  setTimeout(() => {
                    gsap.to(transitionInfo,{opacity:0,duration:1});
                    document.getElementById('thresholdScene').style.display = 'none';
                    // تحميل المشهد الأول (لا تتوقف الموسيقى هنا)
                    Transition.loadScene('scenes/scene01.html', document.getElementById('sceneContainer'));
                  }, 2500);
                }});
              }, 1000);
            }});
          }});
        }, 400);
      });
    })();
  </script>
</body>
</html>
