<div class="scene-content" style="justify-content: center; background:#000;">

  <!-- لا صور، لا شرائح، لا تأثيرات — فقط سواد وكلمات، بنفس مكوّن .silence-line المستخدم حرفيًا
       فى Scene04/Scene05/Scene07/Scene08، بلا أى تعديل على تصميمه -->

  <div class="silence-line" id="n1">On my way home...</div>
  <div class="silence-line" id="n2">I couldn't stop smiling.</div>

  <div class="silence-line" id="n3">That night...</div>
  <div class="silence-line" id="n4">I kept replaying the day...<br>over and over again.</div>

  <div class="silence-line" id="n5">And somewhere between...<br>all those memories...</div>
  <div class="silence-line" id="n6">I realized...</div>

  <div class="silence-line" id="n7">I wasn't waiting...<br>for another date.</div>
  <div class="silence-line" id="n8">I was waiting...</div>
  <div class="silence-line em" id="n9">for you.</div>

  <div class="silence-line" id="n10">I wanted to tell you...</div>
  <div class="silence-line" id="n11">...the only way I knew how.</div>

</div>

<style>
  /* هذا المشهد لا يحتوي على أي شيء غير الكلمات والسواد — لا صور، لا حركات زخرفية، لا جسيمات */
  .scene-content { background: #000; }

  .silence-line {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 640px;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.5rem, 4vw, 2.3rem);
    font-weight: 300;
    color: #F2E9E4;
    letter-spacing: 0.02em;
    line-height: 1.5;
    opacity: 0;
    white-space: pre-line;
  }
  /* "for you." يستحق نفس المعاملة التى نالتها "You." فى Scene05 — الكلمة التى تحمل المشهد كله */
  .silence-line.em {
    font-size: clamp(2.2rem, 6vw, 3.4rem);
    color: #D4B28C;
    letter-spacing: 0.06em;
  }
</style>

<script>
  (function() {
    // ============================================================
    // Scene09 — the quiet bridge between the first date and the confession.
    // No photographs, no slideshow, no decorative motion, no particles.
    // Only black, narration, and silence. The confession website itself
    // is the true final scene — this page hands off to it directly.
    // ============================================================

    // تحميل صامت لمشهد الاعتراف مبكرًا — نفس تقنية كل انتقال سابق فى الفيلم،
    // حتى يكون جاهزًا تمامًا لحظة السواد، بلا أى تأخير أو قطع
    if (typeof Transition !== 'undefined') {
      Transition.preload('scenes/scene10.html');
    }

    // --- الموسيقى تختفي فورًا، بلا Fade درامي وبلا استبدال بأغنية أخرى — الصمت هنا جزء من الحكاية ---
    if (typeof AudioManager !== 'undefined') {
      AudioManager.stop();
    }

    const tl = gsap.timeline({ delay: 0.5, defaults: { ease: 'power2.inOut' } });

    // --- صمت كامل عدة ثوانٍ فى بداية المشهد قبل أى كلمة — دع الجمهور يشعر بغياب الموسيقى تمامًا ---
    tl.to({}, { duration: 5.5 });

    // --- السطر الأول والثانى: فكرة واحدة متصلة ---
    tl.to('#n1', { opacity: 1, duration: 1.8 }, '+=0.3');
    tl.to('#n1', { opacity: 0, duration: 1.3 }, '+=2.8');

    tl.to('#n2', { opacity: 1, duration: 1.8 }, '+=1');
    tl.to('#n2', { opacity: 0, duration: 1.3 }, '+=3');

    // --- سكون أطول قليلاً — ننتقل من "تلك الليلة" ---
    tl.to({}, { duration: 1.8 });

    tl.to('#n3', { opacity: 1, duration: 1.6 }, '+=0.3');
    tl.to('#n3', { opacity: 0, duration: 1.2 }, '+=2.6');

    tl.to('#n4', { opacity: 1, duration: 1.8 }, '+=1');
    tl.to('#n4', { opacity: 0, duration: 1.4 }, '+=3.4');

    tl.to({}, { duration: 1.6 });

    tl.to('#n5', { opacity: 1, duration: 1.8 }, '+=0.3');
    tl.to('#n5', { opacity: 0, duration: 1.4 }, '+=3.2');

    tl.to('#n6', { opacity: 1, duration: 1.6 }, '+=1');
    tl.to('#n6', { opacity: 0, duration: 1.2 }, '+=2.8');

    // --- سكون أطول قبل لحظة الإدراك ---
    tl.to({}, { duration: 2 });

    tl.to('#n7', { opacity: 1, duration: 1.8 }, '+=0.3');
    tl.to('#n7', { opacity: 0, duration: 1.4 }, '+=3.2');

    tl.to('#n8', { opacity: 1, duration: 1.8 }, '+=1.2');
    tl.to('#n8', { opacity: 0, duration: 1.4 }, '+=2.6');

    // --- "for you." — ذروة المشهد، تستحق وقفة أطول من أى سطر آخر ---
    tl.to('#n9', { opacity: 1, duration: 2.2 }, '+=1.6');
    tl.to('#n9', { opacity: 0, duration: 1.8 }, '+=4');

    // --- سكون طويل بعد الذروة، قبل السطرين الأخيرين ---
    tl.to({}, { duration: 3 });

    tl.to('#n10', { opacity: 1, duration: 1.8 }, '+=0.3');
    tl.to('#n10', { opacity: 0, duration: 1.4 }, '+=3');

    tl.to('#n11', { opacity: 1, duration: 2 }, '+=1.4');
    tl.to('#n11', { opacity: 0, duration: 1.8 }, '+=3.8');

    // --- سواد كامل، بلا "End"، بلا "Continue"، بلا بطاقة تاريخ، بلا مؤشر تحميل — فقط سكون ---
    tl.to({}, { duration: 2.8 });

    // ============================================================
    // الانتقال إلى مشهد الاعتراف — ليس فتح موقع جديد، ولا تبويب جديد، ولا iframe.
    // نفس نظام المشاهد المستخدم فى كل الفيلم (Transition.loadScene)، لكن هذه المرة
    // بمذاب أبطأ وأكثر تعمدًا من الانتقال الافتراضي — كأن السواد نفسه يكشف طبقة
    // جديدة من نفس القصة، لا يقطعها. الجمهور لا يشعر أبدًا أنه غادر التجربة.
    // ============================================================
    tl.call(() => {
      const container = document.getElementById('sceneContainer');

      // نُبقي الحاوية بأكملها ظاهرة (لسنا نغادر الصفحة) بينما نستبدل محتواها فى العتمة الكاملة
      Transition.loadScene('scenes/scene10.html', container, () => {
        // مشهد الاعتراف نفسه يتحكم فى إيقاع ظهوره ببطء شديد داخل سكربته الخاص —
        // هنا فقط نتأكد أن الحاوية جاهزة ومرئية، بلا أى قطع أو وميض
        container.style.pointerEvents = 'auto';
      });
    });
  })();
</script>
