<div class="scene-content" style="justify-content: flex-start; padding-top: 6vh;">
  <!-- التاريخ والمكان فوق الصورة -->
  <div class="scene-location" id="loc" style="margin-top:0;">6 October 2023 · NASA Space Apps Cairo</div>

  <!-- الصورة وحدها، نظيفة بلا أي طبقة فوقها -->
  <div class="image-wrapper">
    <img src="assets/images/nasa-first.jpeg" alt="النظرة الأولى" class="scene-img" id="img" style="max-height:46vh;" onerror="this.style.display='none';">
  </div>

  <!-- النصوص تحت الصورة، تكمّلها ولا تغطيها -->
  <div class="scene-copy" id="copy">
    <div class="scene-text" id="line1">I didn't know your name.</div>
    <div class="scene-text" id="line2">I didn't know your story.</div>
    <div class="scene-text" id="line3">But somehow...</div>
    <div class="scene-text" id="line4">I remembered your face.</div>
  </div>

  <div class="next-date" id="next">May 2024</div>
</div>

<script>
  (function() {
    // موسيقى العتبة ما زالت مستمرة، لا نلمسها هنا

    const tl = gsap.timeline({ delay: 0.5, defaults: { ease: 'power2.inOut' } });

    // --- التاريخ ---
    tl.to('#loc', { opacity: 1, duration: 1.5 }, '+=1');
    tl.to('#loc', { opacity: 0, delay: 2.5, duration: 1 }, '-=0.2');
    
    // --- الصورة (Fade + Unblur) ---
    tl.to('#img', {
      opacity: 1,
      scale: 1.0,
      filter: 'blur(0px)',
      duration: 8,
      ease: 'power2.out'
    }, '-=0.8');
    tl.call(() => document.getElementById('img').classList.add('loaded'));

    // --- ظهور الجمل بالتتابع مع إخفاء السابقة ---
    tl.to('#line1', { opacity: 1, duration: 1.5 }, '+=2');

    tl.to('#line2', { opacity: 1, duration: 1.5 }, '+=3.5');
    tl.to('#line1', { opacity: 0, duration: 0.8 }, '-=1.0');

    tl.to('#line3', { opacity: 1, duration: 1.2 }, '+=3.8');
    tl.to('#line2', { opacity: 0, duration: 0.8 }, '-=0.8');

    tl.to('#line4', { opacity: 1, duration: 1.8 }, '+=3.5');
    tl.to('#line3', { opacity: 0, duration: 0.8 }, '-=0.8');

    // --- الجملة الأخيرة تبقى 6 ثوانٍ ---
    tl.to({}, { duration: 6 });

    // --- اختفاء الجملة الأخيرة ---
    tl.to('#line4', { opacity: 0, duration: 1.2 }, '+=0.5');

    // --- الصورة وحدها 3 ثوانٍ ---
    tl.to({}, { duration: 3 });

    // --- Fade out الصورة ---
    tl.to('#img', { opacity: 0, duration: 1.8, ease: 'power2.in' }, '+=0.5');

    // --- عند اختفاء الصورة (سواد) نبدأ تلاشي الموسيقى ---
    tl.call(() => {
      // بدء fadeOut للموسيقى على مدى 6 ثوانٍ
      AudioManager.fadeOut(6000);
    });

    // --- سواد مع موسيقى متلاشية: انتظار 3 ثوانٍ قبل ظهور التاريخ ---
    tl.to({}, { duration: 3 });

    // --- ظهور May 2024 ---
    tl.to('#next', { opacity: 1, duration: 1.5 });
    tl.to('#next', { opacity: 0, delay: 2.5, duration: 1 });

    // --- جاهزون للمشهد التالي ---
    tl.call(() => {
      console.log('🎬 المشهد الأول انتهى والموسيقى تلاشت. الآن يمكن بدء Scene 02.');
      // مستقبلاً: AudioManager.play('scene02', 0.18); 
      // Transition.loadScene('scenes/scene02.html', document.getElementById('sceneContainer'));
    });
  })();
</script>

    }, '-=0.8');

    tl.to('#line1', { opacity: 1, duration: 1.5 }, '+=2');

    tl.to('#line1', { opacity: 0, duration: 0.8 }, '-=1.0');

    tl.to('#line3', { opacity: 1, duration: 1.2 }, '+=3.8');

    tl.to('#line4', { opacity: 1, duration: 1.8 }, '+=3.5');
    tl.to('#line3', { opacity: 0, duration: 0.8 }, '-=0.8');

    tl.to({}, { duration: 6 });

    tl.to('#line4', { opacity: 0, duration: 1.2 }, '+=0.5');
    tl.to({}, { duration: 3 });

    tl.to('#img', { opacity: 0, duration: 1.8, ease: 'power2.in' }, '+=0.5');

    // --- لا نلمس الموسيقى ---
    tl.to({}, { duration: 3 });

    tl.to('#next', { opacity: 1, duration: 1.5 });
    tl.to('#next', { opacity: 0, delay: 2.5, duration: 1 });

    // ✨ هنا الانتقال للمشهد الثاني
    tl.call(() => {
      const container = document.getElementById('sceneContainer');
      Transition.loadScene('scenes/scene02.html', container);
    });
  })();
</script>
