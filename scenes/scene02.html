<div class="scene-content" style="justify-content: flex-start; padding-top: 4vh;">
  <!-- التاريخ والمكان -->
  <div class="scene-location" id="loc" style="margin-top:0;">May 2024 · VEP Online</div>

  <!-- الهدية هي بطلة المشهد، وليست صورتها -->
  <div class="image-wrapper">
    <img src="assets/images/gift.png" alt="الهدية" class="scene-img" id="img" style="max-height:58vh;" onerror="this.style.display='none';">
  </div>

  <!-- النصوص تحت الصورة -->
  <div class="scene-copy" id="copy">
    <div class="scene-text" id="line1">I couldn't believe it.</div>
    <div class="scene-text" id="line2">It was you.</div>
    <div class="scene-text" id="line3">The girl I never forgot.</div>
    <div class="scene-text" id="line4">This time...<br>life gave us a reason to talk.</div>
  </div>
</div>

<script>
  (function() {
    // الموسيقى مستمرة من Threshold + Scene01 بلا أي لمسة هنا —
    // Act I كله ذكرى واحدة، نفس الـ Theme، بلا Restart وبلا Crossfade.

    // تحميل صامت لـ Scene03 مبكرًا — نفس تقنية Threshold → Scene01 → Scene02،
    // حتى يكون المشهد التالي جاهزًا تمامًا لحظة السواد، بلا أي تأخير أو قطع
    if (typeof Transition !== 'undefined') {
      Transition.preload('scenes/scene03.html');
    }
    (new Image()).src = 'assets/images/nasa-2024.jpeg';

    const tl = gsap.timeline({ delay: 0.5, defaults: { ease: 'power2.inOut' } });

    // --- التاريخ والمكان ---
    tl.to('#loc', { opacity: 1, duration: 1.5 }, '+=1');
    tl.to('#loc', { opacity: 0, delay: 2.5, duration: 1 }, '-=0.2');

    // --- الهدية (Fade + Unblur) ---
    tl.to('#img', {
      opacity: 1,
      scale: 1.0,
      filter: 'blur(0px)',
      duration: 8,
      ease: 'power2.out'
    }, '-=0.8');
    tl.call(() => document.getElementById('img').classList.add('loaded'));

    // --- ظهور الجمل بالتتابع مع إخفاء السابقة ---
    tl.to('#line1', { opacity: 1, duration: 1.5 }, '+=2');

    tl.to('#line2', { opacity: 1, duration: 1.5 }, '+=3.5');
    tl.to('#line1', { opacity: 0, duration: 0.8 }, '-=1.0');

    tl.to('#line3', { opacity: 1, duration: 1.2 }, '+=3.8');
    tl.to('#line2', { opacity: 0, duration: 0.8 }, '-=0.8');

    tl.to('#line4', { opacity: 1, duration: 1.8 }, '+=3.5');
    tl.to('#line3', { opacity: 0, duration: 0.8 }, '-=0.8');

    // --- الجملة الأخيرة تبقى 6 ثوانٍ ---
    tl.to({}, { duration: 6 });

    // --- اختفاء الجملة الأخيرة ---
    tl.to('#line4', { opacity: 0, duration: 1.2 }, '+=0.5');

    // --- الصورة وحدها 3 ثوانٍ ---
    tl.to({}, { duration: 3 });

    // --- Fade out الصورة ---
    tl.to('#img', { opacity: 0, duration: 1.8, ease: 'power2.in' }, '+=0.5');

    // ملاحظة: لا لمسة للموسيقى هنا أيضًا — لسه في Act I.
    // أول تغيير حقيقي للـ Theme هيبقى عند مشهد "غلبني الشوق"، مش هنا.
    // --- سواد: نهاية المشهد حتى يُحسم Scene03 ---
    tl.to({}, { duration: 3 });

    tl.call(() => {
      const container = document.getElementById('sceneContainer');
      Transition.showDateCard({
        month: 'July',
        year: '2024',
        location1: 'NASA Space Apps Cairo',
        location2: 'Future University'
      }, () => {
        Transition.loadScene('scenes/scene03.html', container);
      });
    });
  })();
</script>
