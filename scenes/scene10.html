    const o=actx.createOscillator(),g=actx.createGain(),fl=actx.createBiquadFilter();
    o.type='sawtooth';o.frequency.value=f;fl.type='lowpass';fl.frequency.value=200;
    g.gain.setValueAtTime(0,actx.currentTime);g.gain.linearRampToValueAtTime(.02,actx.currentTime+3+i);
    o.connect(fl);fl.connect(g);g.connect(mgain);o.start();ambG.push(g);
  });
}

/* ══ AUDIO-REACTIVE LOOP ══ */
let energy=0,bass=0,mid=0,labl=0,lastAB=0;
(function ar(t){

      for(let i=0;i<L;i++){tot+=fdata[i];if(i<L/8)b+=fdata[i];else if(i<L*.33)m+=fdata[i];}
      energy=tot/(L*255);bass=b/(L/8)/255;mid=m/(L*.25)/255;
    }
    window._setFog(.28+energy*1.55);
    G('bloom').style.opacity=String(Math.max(0,bass*.8-.08));
    hgl=Math.max(1,1+bass*.75);
    if(bass>.46&&(t-lastAB)>260){
      lastAB=t;heartBeat(bass);
      if(bass>.62){window._glitch(bass-.42,75);window._shake(bass*.38);}
      window._burst(Math.floor(bass*16));
    }
  }
  raf(ar);
})(0);

/* ══ DIRECTOR ══ */
let dir=false,ds=0,nbTick=0,bpm=65;
let c_v=false,c_cl=false,c_ou=false,c_en=false;

function directorLoop(t){
  if(!dir){raf(directorLoop);return;}
  const st=ael.currentTime;
  bpm=st<22?65:st<38?72:82;

  if(t>=nbTick){
    nbTick=t+(60000/bpm);
    const str=bass>.32?bass:.42+(st>CUE.VOCAL?.38:0);
    heartBeat(Math.min(str,1.4));synBeat(Math.min(str*.25,.35));
    if(st>CUE.VOCAL)window._burst(8);
    if(st>CUE.CLIMAX&&Math.random()>.65)window._shake(.3);
  }

  if(st>=CUE.VOCAL&&!c_v){c_v=true;onVocal();}
  if(st>=CUE.CLIMAX&&!c_cl){c_cl=true;onClimax();}
  if(st>=CUE.OUTRO&&!c_ou){c_ou=true;onOutro();}
  if(st>=CUE.END&&!c_en){c_en=true;onEnd();}
  raf(directorLoop);
}

/* ══ HANDOFF TO SCENE11 — "Second Date" ══
   Everything above this line is the confession exactly as it always was —
   nothing about it is touched. This only decides what happens once the
   confession has fully finished playing itself out on its own: real
   silence, one last blinking cursor, then a slow, uneventful fade to
   black that carries us into the next memory. No flashes, no drama,
   no restart of anything already in motion. */
function finishAndTransition(){
  const container=G('sceneContainer');
  if(!container){return;}

  const blackout=document.createElement('div');
  blackout.id='confessionBlackout';
  blackout.style.cssText='position:fixed;inset:0;z-index:1000;background:#00000a;opacity:0;transition:opacity 2s ease;pointer-events:none;';
  container.appendChild(blackout);

  // a few seconds of true stillness — no text, no sound, no movement,
  // just the last blinking cursor from the "em" line fading out on its own
  setTimeout(()=>{
    // one smooth ~2s fade to black
    blackout.style.opacity='1';

    setTimeout(()=>{
      // hold the black screen for about a second before anything begins
      setTimeout(()=>{
        // "A Model of the Universe" begins here, emerging almost
        // inaudibly from silence — same AudioManager, no duplicate audio
        if(typeof AudioManager!=='undefined'){
          AudioManager.playGradualStart('a-model-of-the-universe',0.015,0.07,12000);
        }

        Transition.showDateCard({
          day:'10',
          month:'June',
          year:'2026',
          location1:'Second Date'
        },()=>{
          // the soundtrack keeps playing, uninterrupted, straight into Scene11
          Transition.loadScene('scenes/scene11.html',container);
        });
      },1000);
    },2000);
  },2500);
}
