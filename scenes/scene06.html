<div class="scene-content" style="justify-content: center;">

  <!-- نفس مكوّن الواتساب المستخدم فى Scene04 بالحرف — لا إعادة تصميم، فقط استمرار نفس المحادثة -->
  <div class="wa-wrap" id="waWrap">
    <div class="wa-header">
      <span class="wa-back">‹</span>
      <span class="wa-avatar">♡</span>
      <div class="wa-headtext">
        <div class="wa-name">♡</div>
        <div class="wa-status">online</div>
      </div>
    </div>

    <div class="wa-messages" id="waMessages">
      <div class="wa-date-divider">15 November 2024</div>
      <div class="wa-bubble received"><span dir="rtl" lang="ar">ويوفقك كذلك 🤲</span><small>7:03 PM</small></div>

      <div class="wa-date-divider" id="newDivider" style="opacity: 0;">16 February 2026</div>
    </div>

    <!-- شريط الكتابة — نفس آلية الكتابة والحذف المستخدمة فى Scene05، لكن بلا حذف هذه المرة -->
    <div class="wa-compose-row">
      <div class="compose-bar" id="composeBar">
        <span class="compose-text" id="composeText"><span class="compose-cursor" id="composeCursor">|</span></span>
      </div>
    </div>
  </div>

</div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500&display=swap');

  /* كل شيء هنا محلي لهذا المشهد فقط — نفس أسماء الكلاسات المستخدمة فى Scene04 حرفيًا */
  .wa-wrap {
    width: 100%;
    max-width: 360px;
    background: #0b141a;
    border: 1px solid rgba(212,178,140,0.15);
    border-radius: 14px;
    overflow: hidden;
    opacity: 0;
    box-shadow: 0 30px 60px rgba(0,0,0,0.6);
  }
  .wa-header {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0.8rem 1rem;
    background: #1f2c34;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .wa-back {
    font-size: 1.4rem;
    color: #d4b28c;
    line-height: 1;
  }
  .wa-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3a2a22, #6b4a35);
    display: flex; align-items: center; justify-content: center;
    color: #f2b6c6; font-size: 1rem;
    flex-shrink: 0;
  }
  .wa-headtext { display: flex; flex-direction: column; }
  .wa-name { font-family: 'Inter', sans-serif; font-size: 0.95rem; color: #F2E9E4; }
  .wa-status { font-family: 'Inter', sans-serif; font-size: 0.7rem; color: #8696a0; margin-top: 0.1rem; }

  .wa-messages {
    padding: 1rem 0.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
    min-height: 220px;
    justify-content: flex-end;
  }
  .wa-date-divider {
    align-self: center;
    background: rgba(255,255,255,0.07);
    color: #8696a0;
    font-family: 'Inter', sans-serif;
    font-size: 0.66rem;
    letter-spacing: 0.03em;
    padding: 0.2rem 0.65rem;
    border-radius: 8px;
    margin: 0.25rem 0;
  }
  .wa-bubble {
    max-width: 78%;
    padding: 0.5rem 0.7rem 0.35rem;
    border-radius: 9px;
    font-family: 'Cairo', 'Noto Sans Arabic', sans-serif;
    font-size: 0.88rem;
    line-height: 1.35;
    color: #E9EDEF;
    display: flex;
    flex-direction: column;
    opacity: 1;
    transform: none;
  }
  .wa-bubble span {
    direction: rtl;
    unicode-bidi: plaintext;
    text-align: right;
    white-space: pre-line;
  }
  .wa-bubble small {
    align-self: flex-end;
    font-size: 0.65rem;
    color: rgba(233,237,239,0.55);
    margin-top: 0.2rem;
  }
  .wa-tick { font-style: normal; color: rgba(233,237,239,0.7); }
  .wa-bubble.received {
    background: #1f2c34;
    align-self: flex-start;
    border-top-left-radius: 2px;
  }
  .wa-bubble.sent {
    background: #005c4b;
    align-self: flex-end;
    border-top-right-radius: 2px;
    opacity: 0;
    transform: translateY(2px);
  }

  /* شريط الكتابة — نفس تصميم Scene05 حرفيًا، لكنه الآن جزء ثابت من شاشة الهاتف نفسها */
  .wa-compose-row {
    padding: 0.6rem 0.8rem 0.85rem;
    background: #0b141a;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .compose-bar {
    display: flex;
    align-items: center;
    direction: rtl;
    background: #1f2c34;
    border-radius: 22px;
    padding: 0.6rem 1rem;
    min-height: 1.3rem;
    transition: box-shadow 0.4s ease, background 0.4s ease;
  }
  .compose-bar.focused {
    background: #24333d;
    box-shadow: 0 0 0 1px rgba(212,178,140,0.25);
  }
  .compose-text {
    font-family: 'Cairo', 'Noto Sans Arabic', 'Inter', sans-serif;
    font-size: 0.92rem;
    color: #E9EDEF;
    direction: rtl;
    text-align: right;
    white-space: pre-line;
  }
  .compose-text::after {
    content: '';
  }
  .compose-cursor {
    font-family: 'Inter', sans-serif;
    font-size: 0.92rem;
    color: #8696a0;
    display: inline;
    animation: waBlink 1s step-end infinite;
  }
  @keyframes waBlink { 50% { opacity: 0; } }
</style>

<script>
  (function() {
    // الموسيقى مستمرة من Scene05 بلا أي لمسة — لا play، لا stop، لا fade جديد هنا إطلاقًا.
    if (typeof Transition !== 'undefined') {
      Transition.preload('scenes/scene07.html');
    }

    const tl = gsap.timeline({ delay: 1, defaults: { ease: 'power2.inOut' } });

    // --- فتح المحادثة، تظهر برسالتها الأخيرة القديمة كما تُركت تمامًا ---
    tl.to('#waWrap', { opacity: 1, duration: 2 }, '+=1');

    // --- سكون قصير قبل أي حركة — يشعر الجمهور أنه يعيد فتح نفس الشات القديم ---
    tl.to({}, { duration: 2 });

    // --- لمسة الإصبع على شريط الكتابة: تركيز خفيف جدًا، بلا أي مبالغة ---
    tl.call(() => {
      document.getElementById('composeBar').classList.add('focused');
    });
    tl.to({}, { duration: 0.6 });

    // --- الرسالة الجديدة تظهر تاريخها بهدوء، فقط الآن، لحظة اتخاذ القرار ---
    tl.to('#newDivider', { opacity: 1, duration: 0.8 });
    tl.to({}, { duration: 0.5 });

    // --- الكتابة الحقيقية تبدأ هنا، تُدار كجافاسكربت عادي بعيدًا عن GSAP ---
    tl.call(() => {
      sendAllMessages();
    });

    // --- الرسالة الحقيقية، مقسّمة الآن إلى أربع رسائل منفصلة، كما تُرسل فعليًا فى الواتساب ---
    // كل رسالة: تُكتب سطرًا سطرًا (بفواصل تفكير طبيعية بينها)، تنتظر قليلًا، تُرسل، ثم يعود
    // المؤشر يومض فى الحقل الفارغ قبل أن تبدأ الرسالة التالية فى الكتابة.
    const MESSAGES = [
      {
        lines: [
          { text: 'ازيك يا مريم عامله ايه يارب تكونى بخير', pause: 0 }
        ],
        sendPause: 1400,
        timestamp: '9:47 PM'
      },
      {
        lines: [
          { text: 'بصى يا مريم انا حابب اكون صريح معاكى', pause: 1300 },
          { text: 'انا معجب بيكى', pause: 1600 },
          { text: 'وبحس براحة وانا بتكلم معاكى', pause: 0 }
        ],
        sendPause: 1500,
        timestamp: '9:47 PM'
      },
      {
        lines: [
          { text: 'وحابب نتعرف على بعض اكتر لو انتى حابه', pause: 1350 },
          { text: 'ولو الأمور مشيت تمام ان شاء الله', pause: 0 }
        ],
        sendPause: 1500,
        timestamp: '9:48 PM'
      },
      {
        lines: [
          { text: 'ممكن نفكر فى خطوة رسمية قدام', pause: 1300 },
          { text: 'ايه رأيك؟', pause: 0 }
        ],
        // هذه هى ذروة المشهد العاطفية — المؤشر يبقى يومض بمفرده قبل الإرسال الأخير
        sendPause: 3000,
        isFinal: true,
        timestamp: '9:48 PM'
      }
    ];

    function typingDelay(ch) {
      if (ch === ' ') return 150;
      if (ch === '؟') return 200;
      return 85 + Math.random() * 75;
    }

    // --- تكتب سطرًا واحدًا حرفًا فحرفًا. المؤشر لا يُلمس أبدًا: يبقى بعد آخر حرف دومًا، ولا يتوقف عن الوميض ---
    function typeLine(el, existing, str, cb) {
      let idx = 0;
      (function step() {
        if (idx <= str.length) {
          renderComposeText(existing + str.slice(0, idx));
          const ch = str.charAt(idx - 1);
          idx++;
          setTimeout(step, typingDelay(ch));
        } else {
          cb(existing + str);
        }
      })();
    }

    // --- تكتب رسالة كاملة (قد تحتوى على أكثر من سطر) ثم تنتظر sendPause، والمؤشر يومض طوال الوقت ---
    function typeMessage(msg, cb) {
      const el = document.getElementById('composeText');
      let full = '';
      let i = 0;

      function nextLine() {
        if (i >= msg.lines.length) {
          setTimeout(cb, msg.sendPause);
          return;
        }
        const line = msg.lines[i];
        typeLine(el, full ? full + '\n' : '', line.text, (result) => {
          full = result;
          i++;
          setTimeout(nextLine, line.pause);
        });
      }
      nextLine();
    }

    // --- إرسال فقاعة جديدة: نفس مكوّن الفقاعة المستخدم فى بقية الفيلم، تُبنى الآن برمجيًا فقط ---
    function createSentBubble(text, timestamp) {
      const wrap = document.createElement('div');
      wrap.className = 'wa-bubble sent';
      wrap.style.opacity = 0;
      wrap.style.transform = 'translateY(2px)';

      const span = document.createElement('span');
      span.setAttribute('dir', 'rtl');
      span.setAttribute('lang', 'ar');
      span.textContent = text;

      const small = document.createElement('small');
      const tick = document.createElement('i');
      tick.className = 'wa-tick';
      small.appendChild(document.createTextNode(timestamp + ' '));
      small.appendChild(tick);

      wrap.appendChild(span);
      wrap.appendChild(small);
      document.getElementById('waMessages').appendChild(wrap);
      return { wrap, tick };
    }

    // --- ترسل رسالة واحدة: تُفرَّغ خانة الكتابة فورًا، تظهر الفقاعة بحركة الواتساب الطبيعية، ثم علامتا الصح ---
    function sendMessage(text, isFinal, cb) {
      const composeText = document.getElementById('composeText');

      renderComposeText('');
      // المؤشر يعود فورًا للومض فى الحقل الفارغ — لم يُلمس إطلاقًا فى أى لحظة

      const { wrap, tick } = createSentBubble(text, MESSAGES[currentMessageIndex].timestamp);
      gsap.to(wrap, { opacity: 1, y: 0, duration: 0.28, ease: 'sine.out' });

      const tickDelay = isFinal ? 700 : 300;
      const doubleTickDelay = isFinal ? 2100 : 900;

      setTimeout(() => { tick.textContent = '✓'; }, tickDelay);
      setTimeout(() => {
        tick.textContent = '✓✓';
        cb();
      }, doubleTickDelay);
    }

    // --- تُرسل الأربع رسائل بالتتابع، رسالة بعد الأخرى، تمامًا كما يحدث فعليًا ---
    function sendAllMessages() {
      let i = 0;
      currentMessageIndex = 0;
      function next() {
        if (i >= MESSAGES.length) {
          onAllMessagesSent();
          return;
        }
        const msg = MESSAGES[i];
        currentMessageIndex = i;
        typeMessage(msg, () => {
          sendMessage(msg.lines.map(l => l.text).join('\n'), !!msg.isFinal, () => {
            i++;
            // فترة صمت قصيرة، الحقل فارغ والمؤشر يومض بمفرده، قبل أن تبدأ الرسالة التالية
            setTimeout(next, i < MESSAGES.length ? 1400 : 0);
          });
        });
      }
      next();
    }

    let currentMessageIndex = 0;

    // --- بعد وصول الرسالة الأخيرة: سكون، لا حوار، لا تعليق، فقط الموسيقى مستمرة كما هى ---
    function onAllMessagesSent() {
      setTimeout(() => {
        gsap.to('#waWrap', {
          opacity: 0, duration: 2.2, ease: 'power2.in',
          onComplete: () => {
            // --- سواد، ثم بطاقة الذكرى الموجودة فعلاً — نفس مكوّن كل انتقال سابق، ونتوقف هنا فقط ---
            setTimeout(() => {
              const container = document.getElementById('sceneContainer');
              Transition.showDateCard({
                day: '19',
                month: 'March',
                year: '2026',
                location1: 'The Second Try'
                }, () => {
                Transition.loadScene('scenes/scene07.html', container);
              });
            }, 900);
          }
        });
      }, 5000);
    }

    const composeTextNode = document.createTextNode('');
    const composeCursor = document.getElementById('composeCursor');
    const composeText = document.getElementById('composeText');
    composeText.insertBefore(composeTextNode, composeCursor);

    function renderComposeText(text) {
      composeTextNode.data = text;
    }
  })();
</script>
